name: B12 Submission

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run submission script
        run: python submit.py
        env:
          SIGNING_SECRET: ${{ secrets.SIGNING_SECRET }}
          RESUME_LINK: ${{ vars.RESUME_LINK }}